<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prueba MSAL - Liceo Tucurrique</title>
    <script src="https://alcdn.msauth.net/browser/2.21.0/js/msal-browser.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .container { max-width: 800px; margin-top: 50px; }
        .card { margin-bottom: 20px; }
        .status { padding: 10px; border-radius: 5px; }
        .success { background-color: #d4edda; color: #155724; }
        .error { background-color: #f8d7da; color: #721c24; }
        .info { background-color: #d1ecf1; color: #0c5460; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h2>Prueba MSAL.js - Liceo Tucurrique</h2>
            </div>
            <div class="card-body">
                <!-- Estado de la aplicación -->
                <div id="status" class="status info">
                    Estado: No autenticado
                </div>

                <!-- Botones de autenticación -->
                <div class="mb-3">
                    <button id="loginBtn" class="btn btn-success me-2">
                        <i class="fas fa-sign-in-alt"></i> Iniciar Sesión
                    </button>
                    <button id="logoutBtn" class="btn btn-secondary" disabled>
                        <i class="fas fa-sign-out-alt"></i> Cerrar Sesión
                    </button>
                </div>

                <!-- Información del usuario -->
                <div id="userInfo" class="mb-3" style="display: none;">
                    <h5>Información del Usuario</h5>
                    <div id="userDetails"></div>
                </div>

                <!-- Crear evento y reunión -->
                <div class="card">
                    <div class="card-header">
                        <h5>Crear Evento y Reunión Virtual</h5>
                    </div>
                    <div class="card-body">
                        <form id="meetingForm">
                            <div class="mb-3">
                                <label for="meetingTitle" class="form-label">Título de la Reunión</label>
                                <input type="text" class="form-control" id="meetingTitle" 
                                       value="Reunión de Prueba - Liceo Tucurrique" required>
                            </div>
                            <div class="mb-3">
                                <label for="meetingDescription" class="form-label">Descripción</label>
                                <textarea class="form-control" id="meetingDescription" rows="3">
Reunión de prueba para verificar la integración con Microsoft Graph y Teams.
                                </textarea>
                            </div>
                            <div class="row">
                                <div class="col-md-6">
                                    <label for="startTime" class="form-label">Fecha y Hora de Inicio</label>
                                    <input type="datetime-local" class="form-control" id="startTime" required>
                                </div>
                                <div class="col-md-6">
                                    <label for="endTime" class="form-label">Fecha y Hora de Fin</label>
                                    <input type="datetime-local" class="form-control" id="endTime" required>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label for="attendees" class="form-label">Participantes (emails separados por coma)</label>
                                <input type="text" class="form-control" id="attendees" 
                                       placeholder="usuario1@mep.go.cr, usuario2@mep.go.cr">
                            </div>
                            
                            <div class="d-grid gap-2">
                                <button type="button" id="createMeetingBtn" class="btn btn-primary" disabled>
                                    <i class="fas fa-video"></i> Crear Reunión Virtual
                                </button>
                                <button type="button" id="createEventBtn" class="btn btn-info" disabled>
                                    <i class="fas fa-calendar-plus"></i> Solo Crear Evento en Calendario
                                </button>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- Resultados -->
                <div id="results" style="display: none;">
                    <h5>Resultados</h5>
                    <div id="resultsContent"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Configuración MSAL con tus datos
        const msalConfig = {
            auth: {
                clientId: "be0e9b41-718d-4d2a-8c2f-d26eba67d767",
                authority: "https://login.microsoftonline.com/mep.go.cr",
                redirectUri: "https://tecnopresta.mep.go.cr/index.html"
            },
            cache: {
                cacheLocation: "sessionStorage",
                storeAuthStateInCookie: false
            }
        };

        // Scopes necesarios para Microsoft Graph
        const graphScopes = {
            scopes: [
                "Calendars.ReadWrite",
                "OnlineMeetings.ReadWrite",
                "User.Read"
            ]
        };

        // Inicializar MSAL
        const msalInstance = new msal.PublicClientApplication(msalConfig);

        // Elementos DOM
        const loginBtn = document.getElementById('loginBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const createMeetingBtn = document.getElementById('createMeetingBtn');
        const createEventBtn = document.getElementById('createEventBtn');
        const statusDiv = document.getElementById('status');
        const userInfoDiv = document.getElementById('userInfo');
        const userDetailsDiv = document.getElementById('userDetails');
        const resultsDiv = document.getElementById('results');
        const resultsContentDiv = document.getElementById('resultsContent');

        // Establecer fechas por defecto (1 hora a partir de ahora)
        function setDefaultTimes() {
            const now = new Date();
            const startTime = new Date(now.getTime() + 60 * 60 * 1000); // 1 hora desde ahora
            const endTime = new Date(startTime.getTime() + 60 * 60 * 1000); // Duración de 1 hora
            
            document.getElementById('startTime').value = formatDateTimeLocal(startTime);
            document.getElementById('endTime').value = formatDateTimeLocal(endTime);
        }

        function formatDateTimeLocal(date) {
            return date.toISOString().slice(0, 16);
        }

        // Inicializar la aplicación
        async function initializeApp() {
            try {
                // Verificar si ya hay una sesión activa
                const accounts = msalInstance.getAllAccounts();
                if (accounts.length > 0) {
                    msalInstance.setActiveAccount(accounts[0]);
                    await updateUI(true, accounts[0]);
                } else {
                    await updateUI(false);
                }
            } catch (error) {
                console.error('Error inicializando app:', error);
                updateStatus('Error inicializando: ' + error.message, 'error');
            }
        }

        // Actualizar interfaz de usuario
        async function updateUI(isAuthenticated, account = null) {
            if (isAuthenticated && account) {
                loginBtn.disabled = true;
                logoutBtn.disabled = false;
                createMeetingBtn.disabled = false;
                createEventBtn.disabled = false;
                
                userInfoDiv.style.display = 'block';
                userDetailsDiv.innerHTML = `
                    <p><strong>Nombre:</strong> ${account.name || 'No disponible'}</p>
                    <p><strong>Email:</strong> ${account.username || 'No disponible'}</p>
                    <p><strong>ID:</strong> ${account.homeAccountId || 'No disponible'}</p>
                `;
                
                updateStatus('Autenticado correctamente', 'success');
            } else {
                loginBtn.disabled = false;
                logoutBtn.disabled = true;
                createMeetingBtn.disabled = true;
                createEventBtn.disabled = true;
                
                userInfoDiv.style.display = 'none';
                userDetailsDiv.innerHTML = '';
                resultsDiv.style.display = 'none';
                
                updateStatus('No autenticado', 'info');
            }
        }

        // Actualizar estado
        function updateStatus(message, type) {
            statusDiv.textContent = `Estado: ${message}`;
            statusDiv.className = `status ${type}`;
        }

        // Login
        loginBtn.addEventListener('click', async () => {
            try {
                updateStatus('Iniciando sesión...', 'info');
                
                const loginResponse = await msalInstance.loginPopup(graphScopes);
                msalInstance.setActiveAccount(loginResponse.account);
                
                await updateUI(true, loginResponse.account);
            } catch (error) {
                console.error('Error en login:', error);
                updateStatus('Error en login: ' + error.message, 'error');
            }
        });

        // Logout
        logoutBtn.addEventListener('click', () => {
            msalInstance.logoutPopup({
                postLogoutRedirectUri: msalConfig.auth.redirectUri,
                mainWindowRedirectUri: msalConfig.auth.redirectUri
            });
            updateUI(false);
        });

        // Crear reunión virtual completa (evento + meeting)
        createMeetingBtn.addEventListener('click', async () => {
            await createMeeting(true);
        });

        // Solo crear evento en calendario
        createEventBtn.addEventListener('click', async () => {
            await createMeeting(false);
        });

        // Función principal para crear meeting
        async function createMeeting(createOnlineMeeting = true) {
            try {
                updateStatus('Creando reunión...', 'info');
                
                // Obtener token de acceso
                const tokenResponse = await msalInstance.acquireTokenSilent({
                    scopes: graphScopes.scopes,
                    account: msalInstance.getActiveAccount()
                });

                const accessToken = tokenResponse.accessToken;

                // Preparar datos del evento
                const formData = getFormData();
                
                let results = {
                    event: null,
                    meeting: null,
                    error: null
                };

                // Crear reunión online si se solicita
                if (createOnlineMeeting) {
                    try {
                        results.meeting = await createOnlineMeeting(accessToken, formData);
                        // Agregar el join URL a la descripción del evento
                        formData.description += `\n\n🔗 **Unirse a la reunión:** ${results.meeting.joinWebUrl}`;
                    } catch (meetingError) {
                        console.warn('Error creando reunión online:', meetingError);
                        results.error = meetingError.message;
                    }
                }

                // Crear evento en calendario
                try {
                    results.event = await createCalendarEvent(accessToken, formData);
                } catch (eventError) {
                    console.error('Error creando evento:', eventError);
                    if (!results.error) results.error = eventError.message;
                    else results.error += ` | Evento: ${eventError.message}`;
                }

                // Mostrar resultados
                showResults(results, createOnlineMeeting);
                
            } catch (error) {
                console.error('Error general:', error);
                updateStatus('Error: ' + error.message, 'error');
            }
        }

        // Obtener datos del formulario
        function getFormData() {
            const attendees = document.getElementById('attendees').value
                .split(',')
                .map(email => email.trim())
                .filter(email => email.length > 0);

            return {
                subject: document.getElementById('meetingTitle').value,
                description: document.getElementById('meetingDescription').value,
                startTime: document.getElementById('startTime').value + ':00',
                endTime: document.getElementById('endTime').value + ':00',
                attendees: attendees
            };
        }

        // Crear evento en calendario
        async function createCalendarEvent(accessToken, eventData) {
            const endpoint = "https://graph.microsoft.com/v1.0/me/events";
            
            const event = {
                subject: eventData.subject,
                body: {
                    contentType: "HTML",
                    content: eventData.description
                },
                start: {
                    dateTime: eventData.startTime,
                    timeZone: "Central America Standard Time"
                },
                end: {
                    dateTime: eventData.endTime,
                    timeZone: "Central America Standard Time"
                },
                location: {
                    displayName: "Reunión Virtual Microsoft Teams"
                },
                attendees: eventData.attendees.map(email => ({
                    emailAddress: {
                        address: email
                    },
                    type: "required"
                }))
            };

            const response = await fetch(endpoint, {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${accessToken}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(event)
            });

            if (!response.ok) {
                const errorText = await response.text();
                throw new Error(`HTTP ${response.status}: ${errorText}`);
            }

            return await response.json();
        }

        // Crear reunión online
        async function createOnlineMeeting(accessToken, meetingData) {
            const endpoint = "https://graph.microsoft.com/v1.0/me/onlineMeetings";
            
            const meeting = {
                startDateTime: meetingData.startTime,
                endDateTime: meetingData.endTime,
                subject: meetingData.subject,
                participants: {
                    attendees: meetingData.attendees.map(email => ({
                        upn: email,
                        role: "attendee"
                    }))
                }
            };

            const response = await fetch(endpoint, {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${accessToken}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(meeting)
            });

            if (!response.ok) {
                const errorText = await response.text();
                throw new Error(`HTTP ${response.status}: ${errorText}`);
            }

            return await response.json();
        }

        // Mostrar resultados
        function showResults(results, createdMeeting) {
            resultsDiv.style.display = 'block';
            let html = '';

            if (results.event) {
                html += `
                    <div class="alert alert-success">
                        <h6>✅ Evento de calendario creado exitosamente</h6>
                        <p><strong>Título:</strong> ${results.event.subject}</p>
                        <p><strong>ID:</strong> ${results.event.id}</p>
                        <p><strong>Enlace:</strong> <a href="${results.event.webLink}" target="_blank">Abrir en Outlook</a></p>
                    </div>
                `;
            }

            if (results.meeting) {
                html += `
                    <div class="alert alert-info">
                        <h6>🎥 Reunión Virtual creada exitosamente</h6>
                        <p><strong>Join URL:</strong> <a href="${results.meeting.joinWebUrl}" target="_blank">${results.meeting.joinWebUrl}</a></p>
                        <p><strong>Meeting ID:</strong> ${results.meeting.id}</p>
                        <p><strong>Código de acceso:</strong> ${results.meeting.audioConferencing?.conferenceId || 'N/A'}</p>
                    </div>
                `;
            }

            if (results.error) {
                html += `
                    <div class="alert alert-warning">
                        <h6>⚠️ Advertencias/Errores</h6>
                        <p>${results.error}</p>
                    </div>
                `;
            }

            resultsContentDiv.innerHTML = html;
            updateStatus('Operación completada', 'success');
        }

        // Inicializar cuando se carga la página
        document.addEventListener('DOMContentLoaded', function() {
            setDefaultTimes();
            initializeApp();
        });
    </script>
</body>
</html>
