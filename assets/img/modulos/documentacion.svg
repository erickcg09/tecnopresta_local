<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">

<defs>
  <linearGradient id="blueMain" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#2E3E5C"></stop>
    <stop offset="100%" stop-color="#1F2C45"></stop>
  </linearGradient>

  <linearGradient id="screenDark" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#334155"></stop>
    <stop offset="100%" stop-color="#0F172A"></stop>
  </linearGradient>

  <linearGradient id="graySoft" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#F8FAFC"></stop>
    <stop offset="100%" stop-color="#E2E8F0"></stop>
  </linearGradient>

  <linearGradient id="cardSoft" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#FFFFFF"></stop>
    <stop offset="100%" stop-color="#EEF2F7"></stop>
  </linearGradient>

  <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
    <feDropShadow dx="0" dy="8" stdDeviation="10" flood-opacity="0.14"></feDropShadow>
  </filter>
</defs>

<!-- MONITOR -->
<g filter="url(#shadow)">
  <rect x="72" y="42" width="368" height="286" rx="24" fill="url(#screenDark)"></rect>
  <rect x="92" y="62" width="328" height="246" rx="14" fill="white"></rect>
</g>

<!-- TOP BAR -->
<rect x="108" y="76" width="296" height="22" rx="11" fill="#EEF2F7"></rect>
<circle cx="124" cy="87" r="5" fill="#3B82F6"></circle>
<circle cx="140" cy="87" r="5" fill="#64748B"></circle>
<circle cx="156" cy="87" r="5" fill="#CBD5E1"></circle>

<!-- LEFT FOLDER PANEL -->
<g filter="url(#shadow)">
  <rect x="114" y="118" width="102" height="150" rx="14" fill="url(#graySoft)"></rect>
  <path d="M132 154H168L176 144H198C204 144 208 148 208 154V212C208 218 204 222 198 222H132C126 222 122 218 122 212V164C122 158 126 154 132 154Z" fill="url(#blueMain)"></path>
  <rect x="134" y="236" width="64" height="8" rx="4" fill="#CBD5E1"></rect>
</g>

<!-- CENTER DOCUMENT -->
<g filter="url(#shadow)">
  <rect x="232" y="112" width="120" height="164" rx="14" fill="white" stroke="#E2E8F0" stroke-width="3"></rect>
</g>

<!-- Folded corner -->
<path d="M322 112V142H352" fill="#EEF2F7"></path>

<!-- Text lines -->
<rect x="252" y="144" width="72" height="8" rx="4" fill="#CBD5E1"></rect>
<rect x="252" y="164" width="82" height="8" rx="4" fill="#E2E8F0"></rect>
<rect x="252" y="184" width="70" height="8" rx="4" fill="#CBD5E1"></rect>
<rect x="252" y="204" width="80" height="8" rx="4" fill="#E2E8F0"></rect>

<!-- Signature -->
<path d="M252 238C262 228 268 248 278 238C286 230 292 250 304 236C310 230 316 242 326 234" stroke="#3B82F6" stroke-width="4" stroke-linecap="round" fill="none"></path>

<!-- RIGHT ACTION PANEL -->
<g filter="url(#shadow)">
  <rect x="370" y="118" width="40" height="150" rx="14" fill="url(#graySoft)"></rect>
</g>

<!-- Upload -->
<circle cx="390" cy="152" r="14" fill="#3B82F6"></circle>
<path d="M390 160V146" stroke="white" stroke-width="3" stroke-linecap="round"></path>
<path d="M384 152L390 146L396 152" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"></path>

<!-- Check -->
<circle cx="390" cy="196" r="14" fill="url(#blueMain)"></circle>
<path d="M384 196L389 201L397 191" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"></path>

<!-- Lock -->
<circle cx="390" cy="240" r="14" fill="#64748B"></circle>
<rect x="384" y="240" width="12" height="8" rx="2" fill="white"></rect>
<path d="M386 240V236C386 232 394 232 394 240" stroke="white" stroke-width="2.5"></path>

<!-- BOTTOM ROW -->
<g filter="url(#shadow)">
  <rect x="114" y="282" width="296" height="16" rx="8" fill="url(#cardSoft)"></rect>
</g>

<rect x="136" y="287" width="78" height="6" rx="3" fill="#CBD5E1"></rect>
<rect x="226" y="287" width="54" height="6" rx="3" fill="#E2E8F0"></rect>
<rect x="336" y="285" width="54" height="10" rx="5" fill="url(#blueMain)"></rect>

</svg>