<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">

<defs>

  <!-- Paleta Institucional MEP -->

  <linearGradient id="mepBlue" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#164687"></stop>
    <stop offset="100%" stop-color="#021A53"></stop>
  </linearGradient>

  <linearGradient id="mepBlueSoft" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#2D67B1"></stop>
    <stop offset="100%" stop-color="#164687"></stop>
  </linearGradient>

  <linearGradient id="mepGold" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#CFAC65"></stop>
    <stop offset="100%" stop-color="#B89243"></stop>
  </linearGradient>

  <linearGradient id="mepGray" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#D7DBDF"></stop>
    <stop offset="100%" stop-color="#BCC4CC"></stop>
  </linearGradient>

  <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
    <feDropShadow dx="0" dy="8" stdDeviation="10" flood-opacity="0.15"></feDropShadow>
  </filter>

</defs>

<!-- Marco Principal -->

<g filter="url(#shadow)">
  <rect x="108" y="78" width="296" height="214" rx="22" fill="white" stroke="#021A53" stroke-width="6"></rect>
</g>

<!-- Encabezado Superior -->

<g filter="url(#shadow)">
  <rect x="198" y="46" width="116" height="42" rx="14" fill="url(#mepBlue)"></rect>
  <circle cx="256" cy="67" r="7" fill="white"></circle>
</g>

<!-- Panel Central -->

<g filter="url(#shadow)">

  <rect x="148" y="122" width="216" height="122" rx="16" fill="url(#mepBlue)"></rect>

  <!-- Núcleo del Sistema -->

  <circle cx="256" cy="182" r="30" fill="white"></circle>

  <circle cx="256" cy="182" r="12" fill="url(#mepGold)"></circle>

  <path d="M256 148V158" stroke="#164687" stroke-width="4" stroke-linecap="round"></path>

  <path d="M256 206V216" stroke="#164687" stroke-width="4" stroke-linecap="round"></path>

  <path d="M222 182H232" stroke="#164687" stroke-width="4" stroke-linecap="round"></path>

  <path d="M280 182H290" stroke="#164687" stroke-width="4" stroke-linecap="round"></path>

  <!-- Módulo -->

  <rect x="170" y="160" width="34" height="34" rx="8" fill="white"></rect>

  <path d="M204 177H224" stroke="white" stroke-width="3" stroke-dasharray="5 5" stroke-linecap="round"></path>

  <!-- Formulario -->

  <rect x="308" y="152" width="34" height="42" rx="6" fill="white"></rect>

  <rect x="315" y="163" width="18" height="3" rx="1.5" fill="#164687"></rect>

  <rect x="315" y="172" width="14" height="3" rx="1.5" fill="#164687"></rect>

  <path d="M290 177H308" stroke="white" stroke-width="3" stroke-dasharray="5 5" stroke-linecap="round"></path>

  <!-- Permisos -->

  <circle cx="256" cy="136" r="14" fill="url(#mepGold)"></circle>

  <path d="M251 136L255 140L262 131" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"></path>

  <path d="M256 150V164" stroke="white" stroke-width="3" stroke-dasharray="5 5"></path>

</g>

<!-- Gestión de Módulos -->

<g filter="url(#shadow)">

  <circle cx="120" cy="360" r="52" fill="url(#mepBlueSoft)"></circle>

  <rect x="98" y="340" width="44" height="44" rx="8" fill="white"></rect>

  <rect x="108" y="350" width="24" height="4" rx="2" fill="#164687"></rect>

  <rect x="108" y="362" width="18" height="4" rx="2" fill="#164687"></rect>

  <circle cx="144" cy="334" r="10" fill="url(#mepGold)"></circle>

</g>

<!-- Gestión de Formularios -->

<g filter="url(#shadow)">

  <rect x="214" y="312" width="84" height="122" rx="16" fill="url(#mepGray)"></rect>

  <rect x="232" y="332" width="48" height="60" rx="6" fill="white"></rect>

  <rect x="242" y="346" width="28" height="3" rx="1.5" fill="#164687"></rect>

  <rect x="242" y="358" width="20" height="3" rx="1.5" fill="#164687"></rect>

  <rect x="242" y="370" width="24" height="3" rx="1.5" fill="#164687"></rect>

  <circle cx="282" cy="328" r="8" fill="url(#mepGold)"></circle>

</g>

<!-- Roles y Permisos -->

<g filter="url(#shadow)">

  <circle cx="392" cy="360" r="52" fill="url(#mepBlueSoft)"></circle>

  <circle cx="392" cy="342" r="10" fill="white"></circle>

  <circle cx="374" cy="374" r="7" fill="white"></circle>

  <circle cx="410" cy="374" r="7" fill="white"></circle>

  <path d="M392 354L374 368" stroke="white" stroke-width="2.5" stroke-linecap="round"></path>

  <path d="M392 354L410 368" stroke="white" stroke-width="2.5" stroke-linecap="round"></path>

  <path d="M404 330
           L420 336
           V350
           C420 362 413 370 404 373
           C395 370 388 362 388 350
           V336
           Z" fill="url(#mepGold)"></path>

  <path d="M399 349L403 353L410 344" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>

</g>

<!-- Base Institucional -->

<g filter="url(#shadow)">
  <rect x="168" y="448" width="176" height="28" rx="12" fill="url(#mepBlue)"></rect>
</g>

<!-- Franja Corporativa -->

<rect x="108" y="112" width="14" height="150" rx="7" fill="url(#mepGold)" opacity="0.28"></rect>

</svg>