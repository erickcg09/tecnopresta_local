<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">

<defs>
  <linearGradient id="blueMain" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#2E3E5C"></stop>
    <stop offset="100%" stop-color="#1F2C45"></stop>
  </linearGradient>

  <linearGradient id="screenDark" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#334155"></stop>
    <stop offset="100%" stop-color="#0F172A"></stop>
  </linearGradient>

  <linearGradient id="graySoft" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#F8FAFC"></stop>
    <stop offset="100%" stop-color="#E2E8F0"></stop>
  </linearGradient>

  <linearGradient id="cardSoft" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#FFFFFF"></stop>
    <stop offset="100%" stop-color="#EEF2F7"></stop>
  </linearGradient>

  <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
    <feDropShadow dx="0" dy="8" stdDeviation="10" flood-opacity="0.14"></feDropShadow>
  </filter>
</defs>

<!-- MONITOR -->
<g filter="url(#shadow)">
  <rect x="72" y="44" width="368" height="286" rx="24" fill="url(#screenDark)"></rect>
  <rect x="92" y="64" width="328" height="246" rx="14" fill="white"></rect>
</g>

<!-- TOP BAR -->
<rect x="108" y="78" width="296" height="22" rx="11" fill="#EEF2F7"></rect>
<circle cx="124" cy="89" r="5" fill="#3B82F6"></circle>
<circle cx="140" cy="89" r="5" fill="#64748B"></circle>
<circle cx="156" cy="89" r="5" fill="#CBD5E1"></circle>

<!-- TITLE -->
<rect x="138" y="116" width="92" height="10" rx="5" fill="#CBD5E1"></rect>
<rect x="244" y="116" width="56" height="10" rx="5" fill="#E2E8F0"></rect>

<!-- LEFT PERSON -->
<g filter="url(#shadow)">
  <rect x="118" y="146" width="108" height="132" rx="14" fill="url(#graySoft)"></rect>
  <circle cx="172" cy="182" r="24" fill="url(#blueMain)"></circle>
  <circle cx="172" cy="176" r="8" fill="white"></circle>
  <rect x="160" y="188" width="24" height="12" rx="6" fill="white"></rect>
  <rect x="138" y="226" width="68" height="8" rx="4" fill="#CBD5E1"></rect>
  <rect x="146" y="244" width="52" height="8" rx="4" fill="#CBD5E1"></rect>
</g>

<!-- CENTER LAPTOP -->
<g filter="url(#shadow)">
  <rect x="240" y="164" width="92" height="56" rx="10" fill="url(#blueMain)"></rect>
  <rect x="228" y="222" width="116" height="12" rx="6" fill="#64748B"></rect>
  <circle cx="286" cy="170" r="2.5" fill="#64748B"></circle>
</g>

<!-- RIGHT APPROVAL PANEL -->
<g filter="url(#shadow)">
  <rect x="350" y="146" width="52" height="132" rx="14" fill="url(#graySoft)"></rect>
  
  <!-- check -->
  <circle cx="376" cy="178" r="14" fill="#3B82F6"></circle>
  <path d="M370 178L375 183L383 173" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"></path>

  <!-- clock -->
  <circle cx="376" cy="220" r="14" fill="#64748B"></circle>
  <circle cx="376" cy="220" r="7" stroke="white" stroke-width="2"></circle>
  <path d="M376 220V216L380 222" stroke="white" stroke-width="2.5" stroke-linecap="round"></path>

  <!-- return -->
  <circle cx="376" cy="262" r="14" fill="url(#blueMain)"></circle>
  <path d="M382 262H370" stroke="white" stroke-width="3" stroke-linecap="round"></path>
  <path d="M374 256L368 262L374 268" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"></path>
</g>

<!-- FLOW ARROWS -->
<path d="M226 210H238" stroke="#3B82F6" stroke-width="5" stroke-linecap="round"></path>
<path d="M334 210H344" stroke="#3B82F6" stroke-width="5" stroke-linecap="round"></path>

<!-- BOTTOM REQUEST LIST -->
<g filter="url(#shadow)">
  <rect x="118" y="286" width="284" height="16" rx="8" fill="url(#cardSoft)"></rect>
</g>

<rect x="138" y="291" width="72" height="6" rx="3" fill="#CBD5E1"></rect>
<rect x="224" y="291" width="48" height="6" rx="3" fill="#E2E8F0"></rect>
<rect x="338" y="289" width="42" height="10" rx="5" fill="url(#blueMain)"></rect>

</svg>