<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">

<defs>
  <linearGradient id="blueMain" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#2E3E5C"></stop>
    <stop offset="100%" stop-color="#1F2C45"></stop>
  </linearGradient>

  <linearGradient id="screenDark" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#334155"></stop>
    <stop offset="100%" stop-color="#0F172A"></stop>
  </linearGradient>

  <linearGradient id="graySoft" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#F8FAFC"></stop>
    <stop offset="100%" stop-color="#E2E8F0"></stop>
  </linearGradient>

  <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
    <feDropShadow dx="0" dy="6" stdDeviation="8" flood-opacity="0.14"></feDropShadow>
  </filter>
</defs>

<!-- COMPUTER -->
<g filter="url(#shadow)">
  <rect x="86" y="58" width="340" height="258" rx="20" fill="url(#screenDark)"></rect>
  <rect x="104" y="76" width="304" height="222" rx="12" fill="white"></rect>
  <rect x="214" y="322" width="84" height="16" rx="8" fill="#64748B"></rect>
  <rect x="180" y="338" width="152" height="16" rx="8" fill="#94A3B8"></rect>
</g>

<!-- TOP BAR -->
<rect x="118" y="90" width="276" height="24" rx="12" fill="#EEF2F7"></rect>
<circle cx="134" cy="102" r="5" fill="#3B82F6"></circle>
<circle cx="150" cy="102" r="5" fill="#64748B"></circle>
<circle cx="166" cy="102" r="5" fill="#CBD5E1"></circle>

<!-- MODULE GRID -->

