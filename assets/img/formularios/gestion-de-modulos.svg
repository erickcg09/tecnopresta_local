<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">

<defs>

  <!-- Paleta Institucional MEP -->

  <linearGradient id="mepBlue" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#164687"></stop>
    <stop offset="100%" stop-color="#021A53"></stop>
  </linearGradient>

  <linearGradient id="mepBlueSoft" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#2D67B1"></stop>
    <stop offset="100%" stop-color="#164687"></stop>
  </linearGradient>

  <linearGradient id="mepGold" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#CFAC65"></stop>
    <stop offset="100%" stop-color="#B89243"></stop>
  </linearGradient>

  <linearGradient id="mepGray" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#D7DBDF"></stop>
    <stop offset="100%" stop-color="#BCC4CC"></stop>
  </linearGradient>

  <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
    <feDropShadow dx="0" dy="8" stdDeviation="10" flood-opacity="0.15"></feDropShadow>
  </filter>

</defs>

<!-- Marco principal -->

<g filter="url(#shadow)">
  <rect x="108" y="78" width="296" height="214" rx="22" fill="white" stroke="#021A53" stroke-width="6"></rect>
</g>

<!-- Encabezado -->

<g filter="url(#shadow)">
  <rect x="198" y="46" width="116" height="42" rx="14" fill="url(#mepBlue)"></rect>
  <circle cx="256" cy="67" r="7" fill="white"></circle>
</g>

<!-- Panel Principal -->

<g filter="url(#shadow)">

  <rect x="148" y="122" width="216" height="122" rx="16" fill="url(#mepBlue)"></rect>

  <!-- Card principal -->

  <rect x="166" y="142" width="78" height="64" rx="10" fill="white"></rect>

  <rect x="178" y="156" width="54" height="6" rx="3" fill="url(#mepBlueSoft)"></rect>

  <rect x="178" y="170" width="40" height="6" rx="3" fill="#D7DBDF"></rect>

  <rect x="178" y="184" width="48" height="6" rx="3" fill="#D7DBDF"></rect>

  <!-- Engranaje administrador -->

  <circle cx="300" cy="176" r="24" fill="white"></circle>

  <circle cx="300" cy="176" r="9" fill="url(#mepGold)"></circle>

  <path d="M300 148V156" stroke="#164687" stroke-width="4" stroke-linecap="round"></path>
  <path d="M300 196V204" stroke="#164687" stroke-width="4" stroke-linecap="round"></path>
  <path d="M272 176H280" stroke="#164687" stroke-width="4" stroke-linecap="round"></path>
  <path d="M320 176H328" stroke="#164687" stroke-width="4" stroke-linecap="round"></path>

  <path d="M281 157L287 163" stroke="#164687" stroke-width="4" stroke-linecap="round"></path>
  <path d="M313 189L319 195" stroke="#164687" stroke-width="4" stroke-linecap="round"></path>

  <path d="M319 157L313 163" stroke="#164687" stroke-width="4" stroke-linecap="round"></path>
  <path d="M287 189L281 195" stroke="#164687" stroke-width="4" stroke-linecap="round"></path>

  <!-- Relación módulo -->

  <path d="M244 176H270" stroke="white" stroke-width="4" stroke-linecap="round" stroke-dasharray="6 6"></path>

</g>

<!-- Subsistemas -->

<g filter="url(#shadow)">

  <circle cx="120" cy="360" r="52" fill="url(#mepBlueSoft)"></circle>

  <rect x="95" y="338" width="50" height="38" rx="8" fill="white"></rect>

  <rect x="108" y="350" width="24" height="4" rx="2" fill="#164687"></rect>

  <rect x="108" y="360" width="18" height="4" rx="2" fill="#164687"></rect>

  <circle cx="144" cy="332" r="10" fill="url(#mepGold)"></circle>

  <path d="M144 327V337" stroke="white" stroke-width="2" stroke-linecap="round"></path>

  <path d="M139 332H149" stroke="white" stroke-width="2" stroke-linecap="round"></path>

</g>

<!-- Configuración del módulo -->

<g filter="url(#shadow)">

  <rect x="214" y="312" width="84" height="122" rx="16" fill="url(#mepGray)"></rect>

  <circle cx="256" cy="344" r="10" fill="white"></circle>

  <path d="M256 354V368" stroke="#164687" stroke-width="3" stroke-linecap="round"></path>

  <circle cx="256" cy="384" r="10" fill="white"></circle>

  <path d="M256 394V406" stroke="#164687" stroke-width="3" stroke-linecap="round"></path>

  <circle cx="256" cy="420" r="8" fill="url(#mepGold)"></circle>

</g>

<!-- Imagen/Icono -->

<g filter="url(#shadow)">

  <circle cx="392" cy="360" r="52" fill="url(#mepBlueSoft)"></circle>

  <rect x="366" y="336" width="52" height="42" rx="6" fill="white"></rect>

  <path d="M374 368L387 354L396 362L408 348L418 368" stroke="#164687" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"></path>

  <circle cx="382" cy="346" r="4" fill="url(#mepGold)"></circle>

</g>

<!-- Base institucional -->

<g filter="url(#shadow)">
  <rect x="168" y="448" width="176" height="28" rx="12" fill="url(#mepBlue)"></rect>
</g>

<!-- Franja corporativa -->

<rect x="108" y="112" width="14" height="150" rx="7" fill="url(#mepGold)" opacity="0.28"></rect>

</svg>