<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">

<defs>

  <!-- Paleta Institucional MEP -->

  <linearGradient id="mepBlue" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#164687"></stop>
    <stop offset="100%" stop-color="#021A53"></stop>
  </linearGradient>

  <linearGradient id="mepBlueSoft" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#2D67B1"></stop>
    <stop offset="100%" stop-color="#164687"></stop>
  </linearGradient>

  <linearGradient id="mepGold" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#CFAC65"></stop>
    <stop offset="100%" stop-color="#B89243"></stop>
  </linearGradient>

  <linearGradient id="mepGray" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#D7DBDF"></stop>
    <stop offset="100%" stop-color="#BCC4CC"></stop>
  </linearGradient>

  <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
    <feDropShadow dx="0" dy="8" stdDeviation="10" flood-opacity="0.15"></feDropShadow>
  </filter>

</defs>

<!-- Marco principal -->

<g filter="url(#shadow)">
  <rect x="108" y="78" width="296" height="214" rx="22" fill="white" stroke="#021A53" stroke-width="6"></rect>
</g>

<!-- Encabezado -->

<g filter="url(#shadow)">
  <rect x="198" y="46" width="116" height="42" rx="14" fill="url(#mepBlue)"></rect>
  <circle cx="256" cy="67" r="7" fill="white"></circle>
</g>

<!-- Panel principal -->

<g filter="url(#shadow)">

  <rect x="148" y="122" width="216" height="122" rx="16" fill="url(#mepBlue)"></rect>

  <!-- Calendario -->

  <rect x="166" y="142" width="82" height="84" rx="10" fill="white"></rect>

  <rect x="166" y="142" width="82" height="20" rx="10" fill="url(#mepGold)"></rect>

  <circle cx="186" cy="152" r="3" fill="white"></circle>
  <circle cx="228" cy="152" r="3" fill="white"></circle>

  <!-- Día bloqueado -->

  <rect x="188" y="178" width="38" height="28" rx="6" fill="#E8EDF5"></rect>

  <path d="M194 184L220 200" stroke="#164687" stroke-width="4" stroke-linecap="round"></path>

  <path d="M220 184L194 200" stroke="#164687" stroke-width="4" stroke-linecap="round"></path>

  <!-- Técnico -->

  <circle cx="312" cy="168" r="16" fill="white"></circle>

  <circle cx="312" cy="162" r="5" fill="url(#mepBlueSoft)"></circle>

  <path d="M302 180C306 173 309 171 312 171C315 171 318 173 322 180" stroke="url(#mepBlueSoft)" stroke-width="2.5" stroke-linecap="round"></path>

  <!-- Indicador no disponible -->

  <circle cx="312" cy="208" r="14" fill="url(#mepGold)"></circle>

  <path d="M305 201L319 215" stroke="white" stroke-width="3" stroke-linecap="round"></path>

  <path d="M319 201L305 215" stroke="white" stroke-width="3" stroke-linecap="round"></path>

</g>

<!-- Calendario general -->

<g filter="url(#shadow)">

  <circle cx="120" cy="360" r="52" fill="url(#mepBlueSoft)"></circle>

  <rect x="95" y="334" width="50" height="54" rx="8" fill="white"></rect>

  <rect x="95" y="334" width="50" height="12" rx="6" fill="url(#mepGold)"></rect>

  <rect x="105" y="356" width="12" height="10" rx="2" fill="#164687"></rect>
  <rect x="122" y="356" width="12" height="10" rx="2" fill="#164687"></rect>

  <rect x="105" y="372" width="12" height="10" rx="2" fill="#D7DBDF"></rect>
  <rect x="122" y="372" width="12" height="10" rx="2" fill="#D7DBDF"></rect>

</g>

<!-- Disponibilidad -->

<g filter="url(#shadow)">

  <rect x="214" y="312" width="84" height="122" rx="16" fill="url(#mepGray)"></rect>

  <circle cx="256" cy="344" r="10" fill="white"></circle>

  <circle cx="256" cy="376" r="10" fill="white"></circle>

  <circle cx="256" cy="408" r="10" fill="url(#mepGold)"></circle>

  <path d="M256 354V366" stroke="#164687" stroke-width="3" stroke-linecap="round"></path>

  <path d="M256 386V398" stroke="#164687" stroke-width="3" stroke-linecap="round"></path>

</g>

<!-- Personal soporte -->

<g filter="url(#shadow)">

  <circle cx="392" cy="360" r="52" fill="url(#mepBlueSoft)"></circle>

  <circle cx="392" cy="340" r="11" fill="white"></circle>

  <circle cx="376" cy="376" r="8" fill="white"></circle>

  <circle cx="408" cy="376" r="8" fill="white"></circle>

  <path d="M392 352L376 368" stroke="white" stroke-width="2.5" stroke-linecap="round"></path>

  <path d="M392 352L408 368" stroke="white" stroke-width="2.5" stroke-linecap="round"></path>

</g>

<!-- Base institucional -->

<g filter="url(#shadow)">
  <rect x="168" y="448" width="176" height="28" rx="12" fill="url(#mepBlue)"></rect>
</g>

<!-- Franja lateral corporativa -->

<rect x="108" y="112" width="14" height="150" rx="7" fill="url(#mepGold)" opacity="0.28"></rect>

</svg>