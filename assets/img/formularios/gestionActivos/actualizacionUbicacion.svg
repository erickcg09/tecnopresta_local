<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">

<defs>
  <linearGradient id="blueMain" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#192952"></stop>
    <stop offset="100%" stop-color="#0035A0"></stop>
  </linearGradient>

  <linearGradient id="goldAccent" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#CFAC65"></stop>
    <stop offset="100%" stop-color="#F2DAB1"></stop>
  </linearGradient>

  <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
    <feDropShadow dx="0" dy="10" stdDeviation="12" flood-opacity="0.12"></feDropShadow>
  </filter>
</defs>

<!-- CLIPBOARD -->
<g filter="url(#shadow)">
  <rect x="150" y="120" width="200" height="260" rx="26" fill="url(#blueMain)"></rect>
  <rect x="170" y="140" width="160" height="220" rx="18" fill="white"></rect>
</g>

<!-- CLIP -->
<rect x="210" y="90" width="100" height="60" rx="16" fill="url(#blueMain)"></rect>
<circle cx="260" cy="110" r="8" fill="white"></circle>

<!-- TEXTO -->
<rect x="190" y="180" width="120" height="10" rx="5" fill="#CFAC65"></rect>
<rect x="190" y="205" width="90" height="10" rx="5" fill="#E5E7EB"></rect>

<!-- PIN DE UBICACIÓN -->
<g filter="url(#shadow)">
  <path d="M260 235C240 235 225 250 225 270C225 300 260 325 260 325C260 325 295 300 295 270C295 250 280 235 260 235Z" fill="url(#goldAccent)"></path>
  <circle cx="260" cy="270" r="10" fill="#192952"></circle>
</g>

<!-- ICONO ACTUALIZACIÓN -->
<g>
  <path d="M205 265C205 245 225 230 245 230" stroke="url(#blueMain)" stroke-width="8" stroke-linecap="round"></path>
  <path d="M240 220L255 230L240 240" fill="url(#blueMain)"></path>

  <path d="M305 275C305 295 285 310 265 310" stroke="url(#blueMain)" stroke-width="8" stroke-linecap="round"></path>
  <path d="M270 320L255 310L270 300" fill="url(#blueMain)"></path>
</g>

<!-- FLECHA -->
<path d="M230 340H285" stroke="url(#blueMain)" stroke-width="8" stroke-linecap="round"></path>
<path d="M270 328L285 340L270 352" fill="url(#blueMain)"></path>

<!-- PORTÁTIL -->
<g transform="translate(300,340)" filter="url(#shadow)">
  
  <!-- marco dorado -->
  <rect x="0" y="0" width="70" height="42" rx="8" fill="url(#goldAccent)"></rect>
  
  <!-- pantalla -->
  <rect x="4" y="4" width="62" height="32" rx="6" fill="white"></rect>

  <!-- mini pin dentro -->
  <path d="M35 12C30 12 26 16 26 21C26 27 35 32 35 32C35 32 44 27 44 21C44 16 40 12 35 12Z" fill="#192952"></path>
  <circle cx="35" cy="21" r="3" fill="white"></circle>

  <!-- base -->
  <rect x="-8" y="42" width="86" height="12" rx="6" fill="#64748B"></rect>

</g>

</svg>