<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">

<defs>
  <linearGradient id="blueMain" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#192952"></stop>
    <stop offset="100%" stop-color="#0035A0"></stop>
  </linearGradient>

  <linearGradient id="goldAccent" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#CFAC65"></stop>
    <stop offset="100%" stop-color="#F2DAB1"></stop>
  </linearGradient>

  <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
    <feDropShadow dx="0" dy="10" stdDeviation="12" flood-opacity="0.12"></feDropShadow>
  </filter>
</defs>

<!-- CLIPBOARD -->
<g filter="url(#shadow)">
  <rect x="150" y="120" width="200" height="260" rx="26" fill="url(#blueMain)"></rect>
  <rect x="170" y="140" width="160" height="220" rx="18" fill="white"></rect>
</g>

<!-- CLIP -->
<rect x="210" y="90" width="100" height="60" rx="16" fill="url(#blueMain)"></rect>
<circle cx="260" cy="110" r="8" fill="white"></circle>

<!-- TEXTO -->
<rect x="190" y="180" width="110" height="10" rx="5" fill="#CFAC65"></rect>
<rect x="190" y="205" width="80" height="10" rx="5" fill="#E5E7EB"></rect>

<!-- TAG (PLACA / SERIE) -->
<g filter="url(#shadow)">
  <rect x="230" y="235" width="90" height="50" rx="10" fill="url(#goldAccent)"></rect>
  
  <!-- orificio etiqueta -->
  <circle cx="240" cy="260" r="4" fill="white"></circle>

  <!-- líneas tipo serie -->
  <rect x="255" y="248" width="45" height="6" rx="3" fill="white"></rect>
  <rect x="255" y="260" width="35" height="6" rx="3" fill="white"></rect>
  <rect x="255" y="272" width="25" height="6" rx="3" fill="white"></rect>
</g>

<!-- ICONO ACTUALIZACIÓN -->
<g>
  <path d="M205 260C205 240 225 225 245 225" stroke="url(#blueMain)" stroke-width="8" stroke-linecap="round"></path>
  <path d="M240 215L255 225L240 235" fill="url(#blueMain)"></path>

  <path d="M300 275C300 295 280 310 260 310" stroke="url(#blueMain)" stroke-width="8" stroke-linecap="round"></path>
  <path d="M265 320L250 310L265 300" fill="url(#blueMain)"></path>
</g>

<!-- FLECHA -->
<path d="M230 340H285" stroke="url(#blueMain)" stroke-width="8" stroke-linecap="round"></path>
<path d="M270 328L285 340L270 352" fill="url(#blueMain)"></path>

<!-- PORTÁTIL -->
<g transform="translate(300,340)" filter="url(#shadow)">
  
  <!-- marco dorado -->
  <rect x="0" y="0" width="70" height="42" rx="8" fill="url(#goldAccent)"></rect>
  
  <!-- pantalla -->
  <rect x="4" y="4" width="62" height="32" rx="6" fill="white"></rect>

  <!-- serie interna -->
  <rect x="18" y="12" width="34" height="6" rx="3" fill="#192952"></rect>
  <rect x="18" y="22" width="26" height="6" rx="3" fill="#192952"></rect>

  <!-- base -->
  <rect x="-8" y="42" width="86" height="12" rx="6" fill="#64748B"></rect>

</g>

</svg>