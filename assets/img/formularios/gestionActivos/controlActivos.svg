<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">

<defs>
  <linearGradient id="blueMain" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#192952"></stop>
    <stop offset="100%" stop-color="#0035A0"></stop>
  </linearGradient>

  <linearGradient id="goldAccent" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#CFAC65"></stop>
    <stop offset="100%" stop-color="#F2DAB1"></stop>
  </linearGradient>

  <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
    <feDropShadow dx="0" dy="10" stdDeviation="12" flood-opacity="0.12"></feDropShadow>
  </filter>
</defs>

<!-- CLIPBOARD -->
<g filter="url(#shadow)">
  <rect x="150" y="110" width="210" height="270" rx="26" fill="url(#blueMain)"></rect>
  <rect x="170" y="130" width="170" height="230" rx="18" fill="white"></rect>
</g>

<!-- CLIP -->
<rect x="215" y="80" width="100" height="60" rx="16" fill="url(#blueMain)"></rect>
<circle cx="265" cy="100" r="8" fill="white"></circle>

<!-- TÍTULO -->
<rect x="190" y="170" width="120" height="10" rx="5" fill="#CFAC65"></rect>

<!-- ESTADOS (Bueno, Regular, Malo) -->
<g>
  <circle cx="215" cy="215" r="10" fill="#22C55E"></circle> <!-- verde -->
  <circle cx="245" cy="215" r="10" fill="#EAB308"></circle> <!-- amarillo -->
  <circle cx="275" cy="215" r="10" fill="#EF4444"></circle> <!-- rojo -->
</g>

<!-- LÍNEAS -->
<rect x="190" y="240" width="120" height="8" rx="4" fill="#E5E7EB"></rect>
<rect x="190" y="255" width="90" height="8" rx="4" fill="#E5E7EB"></rect>

<!-- TOGGLE PRÉSTAMO -->
<g filter="url(#shadow)">
  <rect x="200" y="280" width="110" height="40" rx="20" fill="url(#goldAccent)"></rect>
  <circle cx="285" cy="300" r="14" fill="#192952"></circle>
  
  <!-- check -->
  <path d="M280 300L285 305L292 295" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
</g>

<!-- FLECHA -->
<path d="M240 350H300" stroke="url(#blueMain)" stroke-width="8" stroke-linecap="round"></path>
<path d="M285 338L300 350L285 362" fill="url(#blueMain)"></path>

<!-- PORTÁTIL -->
<g transform="translate(310,340)" filter="url(#shadow)">
  
  <!-- borde dorado -->
  <rect x="0" y="0" width="70" height="42" rx="8" fill="url(#goldAccent)"></rect>
  
  <!-- pantalla -->
  <rect x="4" y="4" width="62" height="32" rx="6" fill="white"></rect>

  <!-- estado dentro -->
  <circle cx="20" cy="20" r="5" fill="#22C55E"></circle>
  <circle cx="35" cy="20" r="5" fill="#EAB308"></circle>
  <circle cx="50" cy="20" r="5" fill="#EF4444"></circle>

  <!-- base -->
  <rect x="-8" y="42" width="86" height="12" rx="6" fill="#64748B"></rect>

</g>

</svg>