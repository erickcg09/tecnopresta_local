<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">

<defs>

  <!-- Paleta Institucional MEP -->

  <linearGradient id="mepBlue" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#164687"></stop>
    <stop offset="100%" stop-color="#021A53"></stop>
  </linearGradient>

  <linearGradient id="mepBlueSoft" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#2D67B1"></stop>
    <stop offset="100%" stop-color="#164687"></stop>
  </linearGradient>

  <linearGradient id="mepGold" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#CFAC65"></stop>
    <stop offset="100%" stop-color="#B89243"></stop>
  </linearGradient>

  <linearGradient id="mepGray" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#D7DBDF"></stop>
    <stop offset="100%" stop-color="#BCC4CC"></stop>
  </linearGradient>

  <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
    <feDropShadow dx="0" dy="8" stdDeviation="10" flood-opacity="0.15"></feDropShadow>
  </filter>

</defs>

<!-- Marco principal -->

<g filter="url(#shadow)">
  <rect x="108" y="78" width="296" height="214" rx="22" fill="white" stroke="#021A53" stroke-width="6"></rect>
</g>

<!-- Encabezado -->

<g filter="url(#shadow)">
  <rect x="198" y="46" width="116" height="42" rx="14" fill="url(#mepBlue)"></rect>
  <circle cx="256" cy="67" r="7" fill="white"></circle>
</g>

<!-- Panel principal -->

<g filter="url(#shadow)">

  <rect x="148" y="122" width="216" height="122" rx="16" fill="url(#mepBlue)"></rect>

  <!-- Formulario -->

  <rect x="164" y="142" width="82" height="82" rx="10" fill="white"></rect>

  <rect x="178" y="156" width="50" height="5" rx="3" fill="url(#mepBlueSoft)"></rect>

  <rect x="178" y="170" width="38" height="5" rx="3" fill="#D7DBDF"></rect>

  <rect x="178" y="184" width="44" height="5" rx="3" fill="#D7DBDF"></rect>

  <rect x="178" y="198" width="30" height="5" rx="3" fill="#D7DBDF"></rect>

  <!-- Ruta -->

  <path d="M252 182H284" stroke="white" stroke-width="4" stroke-linecap="round" stroke-dasharray="6 6"></path>

  <!-- Permisos -->

  <circle cx="312" cy="182" r="26" fill="white"></circle>

  <circle cx="312" cy="182" r="10" fill="url(#mepGold)"></circle>

  <path d="M312 154V162" stroke="#164687" stroke-width="4" stroke-linecap="round"></path>

  <path d="M312 202V210" stroke="#164687" stroke-width="4" stroke-linecap="round"></path>

  <path d="M284 182H292" stroke="#164687" stroke-width="4" stroke-linecap="round"></path>

  <path d="M332 182H340" stroke="#164687" stroke-width="4" stroke-linecap="round"></path>

  <!-- Escudo de seguridad -->

  <path d="M312 214
           L326 220
           V232
           C326 241 320 248 312 251
           C304 248 298 241 298 232
           V220
           Z" fill="url(#mepGold)"></path>

  <path d="M307 230L311 234L318 226" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"></path>

</g>

<!-- Información del formulario -->

<g filter="url(#shadow)">

  <circle cx="120" cy="360" r="52" fill="url(#mepBlueSoft)"></circle>

  <rect x="96" y="336" width="48" height="52" rx="8" fill="white"></rect>

  <rect x="106" y="350" width="28" height="4" rx="2" fill="#164687"></rect>

  <rect x="106" y="362" width="22" height="4" rx="2" fill="#164687"></rect>

  <rect x="106" y="374" width="30" height="4" rx="2" fill="#164687"></rect>

</g>

<!-- Configuración -->

<g filter="url(#shadow)">

  <rect x="214" y="312" width="84" height="122" rx="16" fill="url(#mepGray)"></rect>

  <circle cx="256" cy="344" r="10" fill="white"></circle>
  <circle cx="256" cy="378" r="10" fill="white"></circle>
  <circle cx="256" cy="412" r="10" fill="url(#mepGold)"></circle>

  <path d="M256 354V368" stroke="#164687" stroke-width="3" stroke-linecap="round"></path>

  <path d="M256 388V402" stroke="#164687" stroke-width="3" stroke-linecap="round"></path>

</g>

<!-- Icono del formulario -->

<g filter="url(#shadow)">

  <circle cx="392" cy="360" r="52" fill="url(#mepBlueSoft)"></circle>

  <rect x="366" y="336" width="52" height="40" rx="6" fill="white"></rect>

  <path d="M374 368L387 354L397 362L408 348L418 368" stroke="#164687" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"></path>

  <circle cx="382" cy="346" r="4" fill="url(#mepGold)"></circle>

  <!-- Candado de permisos -->

  <circle cx="420" cy="332" r="10" fill="url(#mepGold)"></circle>

  <path d="M416 332V328
           C416 325 418 323 420 323
           C422 323 424 325 424 328V332" stroke="white" stroke-width="2" stroke-linecap="round"></path>

  <rect x="416" y="332" width="8" height="6" rx="2" fill="white"></rect>

</g>

<!-- Base institucional -->

<g filter="url(#shadow)">
  <rect x="168" y="448" width="176" height="28" rx="12" fill="url(#mepBlue)"></rect>
</g>

<!-- Franja institucional -->

<rect x="108" y="112" width="14" height="150" rx="7" fill="url(#mepGold)" opacity="0.28"></rect>

</svg>