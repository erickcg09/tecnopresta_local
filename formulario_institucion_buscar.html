<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">        
        <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
        <link  href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
        <title>Buscar Institución</title>
    </head>
    <body>

    <nav class="navbar navbar-expand-md navbar-dark bg-dark">
        <div class="container-fluid">            
            <!-- Botón para móviles (actualizado a BS5) -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarCollapse">
                <span class="navbar-toggler-icon"></span>
            </button>
            <!-- Menú colapsable -->
            <div class="collapse navbar-collapse" id="navbarCollapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="formulario_boleta_de_servicio.html">
                            <i class="bi bi-arrow-left-circle"></i> Regresar
                        </a>
                    </li>   
                </ul>
            </div>
        </div>
        </nav>
       
        <section id="buscar">        
            <div class="container mt-3"> 
                <div class="row justify-content-center">
                    <div class="col-md-8">
                        <form onsubmit="buscar();" action="javascript:void(0);">
                            <div class="input-group">                        
                                <div class="form-floating">
                                    <input type="text" class="form-control" id="txtBuscar" placeholder="Buscar">
                                    <label for="txtBuscar">Digite la Institución o el Código Presupuestario...</label>
                                </div>
                                <span class="input-group-text">                                    
                                        <button id="btnBuscar" onclick="buscar();" type="button" class="btn btn-primary">                                            
                                            <i class="bi bi-binoculars-fill text-dark fs-5"></i>                                            
                                        </button>                                                                        
                                </span>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </section>
        
        <section id="mostrarMensaje" class="container">            
            <div class="row justify-content-center input-group mt-2">
                <div class="col-md-6 text-center"> 
                    <div id="mensaje" class="form-group row"></div>
                </div>    
            </div>            
        </section>

        <section id="spinner" class="container mt-2">            
            <div class="row justify-content-center input-group">                
                <div class="col-md-4 text-center"> 
                    <div class="spinner-border text-light" role="status"></div>
                </div>                                  
            </div>
            <div class="row justify-content-center input-group">                
                <div class="col-md-4 text-center"> 
                    <h5 class="card-title">Procesando ...</h5>
                </div>                                  
            </div>             
        </section> 

        <!-- Plantilla para ser construida por el JS -->           
        <section id="filas-datos" class="container"></section>
                       
        <script src="js/jquery-3.5.1.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
        <script src="js/formulario_institucion_buscar.js?version=17"></script>
    </body>
</html>
