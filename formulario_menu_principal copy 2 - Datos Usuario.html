                async cargaModulos() {
                   console.log("Iniciando CargaModulos");
                    try {
                        const sesion = sessionStorage.getItem('sesion'); // simulación de verificación de sesión
                        const dataAzure = JSON.parse(sesion);
                        console.log("Datos: ", dataAzure);
                        const response = await fetch('sql/formulario_principal.php', {
                            credentials: 'include'
                        }); // Endpoint para obtener los módulos desde la BD
                         
                        
                        //console.log("Response: ", response);

                        const data = await response.json(); // se espera un JSON con la estructura [{id, nombre, descripción, imagen, url}, ...]
                        console.log("Data: ", data);

                        console.log("RESPUESTA COMPLETA:", data);
                        //console.log("SESSION:", data.debug?.session);

                        if (data.error) {
                            this.error = data.error;
                            //Redirigir si no hay sesión
                            /*if (data.error === 'Sesión no válida') {
                                setTimeout(() => {
                                window.location.href = "index.html";
                                }, 1500);
                            }
                            return;*/
                        } 
                         
                        //Asignación correcta
                        this.subsistemas = data; //asigna los Subsistemas obtenidos a la variable del estado
                        
                    } catch (e) {
                        this.error = "Error al cargar los módulos";
                        console.error("Error", e);
                    } finally {
                        this.loading = false; //oculta el loader independientemente del resultado
                    }
                }
            }
