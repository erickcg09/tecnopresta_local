    <script>
      /* ============================================
      * CARGADOR DINÁMICO DE LOGIN
      * ============================================
      * Carga el JS SOLO cuando se necesita
      */
      window.tipoLoginActivo = null; ////carga en la variable el tipo de login, inicializa en null
      function cargarScriptLogin(ruta, callback) {

          // ============================================
          // Si YA existe el script cargado
          // ============================================
          const scriptExistente = document.querySelector(
              `script[src="${ruta}"]`
          );

          if (scriptExistente) {

              console.log("⚠️ Script ya cargado:", ruta);

              // Ejecuta callback directamente
              if (callback) callback();

              return;
          }
          
          if (document.getElementById("loginScript")) { //Si ya hay un script de login cargado, lo elimina para evitar conflictos
              document.getElementById("loginScript").remove(); // Elimina el script existente
          }

          // ============================================
          // Crear nuevo script
          // ============================================
          let script = document.createElement("script");
          script.src = ruta;
          script.id = "loginScript";

          script.onload = async function () {
              console.log("✅ Script cargado:", ruta);

              // 🔥 FORZAR INICIALIZACIÓN MANUAL -  // Inicializar MSAL SOLO si existe
              if (typeof initializeMSAL === "function" && !window.msalInicializado) { // Verifica si MSAL ya fue inicializado
                  await initializeMSAL();
                  window.msalInicializado = true; // Marca MSAL como inicializado
              }

              // 🔥 Ejecutar callback después de inicializar
              if (callback) callback();
          };

          document.body.appendChild(script);
      }

      /**
       * ============================================
       * BOTÓN PRINCIPAL (PRODUCCIÓN)
       * ============================================
       */
      function iniciarLoginNormal() {
        
        window.tipoLoginActivo = "normal"; //carga en la variable el tipo de login

        cargarScriptLogin("js/formulario_login.js?version=15", function () {

          if (typeof signIn === "function") {
            signIn();
          } else {
            console.error("❌ signIn no está definido");
          }

        });
      }

    /**
     * ============================================
     * BOTÓN OCULTO (NUEVA VERSIÓN)
     * ============================================
    */
    function accesoControlado() {

      window.tipoLoginActivo = "especial"; //carga en la variable el tipo de login

      const codigo = prompt("Ingrese código de acceso:");
      if (codigo === null) return;

      if (codigo !== "321456") {
        alert("Acceso no autorizado");
        return;
      }

      console.log("✅ Acceso autorizado");

      cargarScriptLogin("js/formulario_login_e.js?version=13", function () {

        if (typeof signInEspecial === "function") {
          signInEspecial();
        } else {
          console.error("❌ signInEspecial no está definido");
        }

      });
    }
    </script>

<script>
document.getElementById('subscribe').addEventListener('click', function() {
    navigator.serviceWorker.ready.then(function(registration) {
        // Verificar si ya existe una suscripción
        registration.pushManager.getSubscription().then(function(subscription) {
            // Si hay una suscripción activa, cancelarla
            if (subscription) {
                subscription.unsubscribe().then(function() {
                    console.log('Desuscrito con éxito');
                }).catch(function(error) {
                    console.error('Error al desuscribirse:', error);
                });
            }

            // Suscribir nuevamente con la nueva clave
            registration.pushManager.subscribe({
                userVisibleOnly: true,
                applicationServerKey: urlBase64ToUint8Array('BJG5s-2sldzC64tugMXk6xorDxrIcmCMT2J7Wyoq3dFtFshEJ3UvdtUYJ8vGRHl9pepQBZDiaVnH5KDWhlpHvuY')
            }).then(function(subscription) {
                console.log('Usuario suscrito:', subscription);
                // Enviar la suscripción al servidor
                fetch('subscribe.php', {
                    method: 'POST',
                    body: JSON.stringify(subscription),
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });
            }).catch(function(error) {
                console.error('Error al suscribir al usuario:', error);
            });
        });
    });
});
