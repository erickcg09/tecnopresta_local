    <script>
    window.menuApp = function () {
        return {
            usuario: '',
            loading: true,
            error: '',
            subsistemas: [],

            init() {
                this.cargaSesion();
                this.cargaModulos();
            },

            cargaSesion() {
                const sesion = sessionStorage.getItem('sesion');

                if (!sesion) {
                    window.location.href = "index.html";
                    return;
                }

                const data = JSON.parse(sesion);
                this.usuario = data.nombre || data.correo || 'Usuario';
            },

            async cargaModulos() {
                try {
                    const response = await fetch('sql/formulario_principal.php');
                    const data = await response.json();

                    if (data.error) {
                        this.error = data.error;
                    } else {
                        this.subsistemas = data; // ✅ CORREGIDO
                    }

                } catch (e) {
                    this.error = "Error al cargar los módulos";
                    console.error(e);
                } finally {
                    this.loading = false;
                }
            }
        }
    }
    </script>
