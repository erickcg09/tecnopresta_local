<!doctype html>
<html lang="es">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">     
    <!-- Bootstrap CSS -->
    <link  href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <title>Hoja de Visita</title>
  </head>
<body>

<nav class="navbar navbar-expand-md navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="formulario_menu_principal.html">
            <i class="bi bi-laptop"></i> Tecnopresta
        </a>
        <!-- Botón para móviles (actualizado a BS5) -->
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarCollapse">
            <span class="navbar-toggler-icon"></span>
        </button>
        <!-- Menú colapsable -->
        <div class="collapse navbar-collapse" id="navbarCollapse">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" href="formulario_panel_visitas_sitio.html">
                        <i class="bi bi-arrow-left-circle"></i> Regresar
                    </a>
                </li>   
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-2">        
    <div class="row justify-content-center"> 
        <div id="mensaje" class="col-10 col-md-6 text-center fs-5"></div>
    </div>    
</div>

<section id="spinner" class="container mt-1 d-none">            
    <div class="row justify-content-center input-group">                
        <div class="col-md-4 text-center"> 
            <div class="spinner-border text-dark" role="status"></div>
        </div>                                  
    </div>
    <div class="row justify-content-center input-group">                
        <div class="col-md-4 text-center"> 
            <h5 class="card-title">Procesando ...</h5>
        </div>                                  
    </div>             
</section>

<div class="container mt-2">

    <div class="row justify-content-center mb-2">
        <span id="prioridad" class="col-auto badge bg-danger"
            style="font-family: Georgia, serif;">
        </span>
    </div>  

    <div class="row justify-content-center mb-2">
        <div class="col text-center"> 
            <p id="titulo" class="h3 fw-bold" 
                style="font-family: 'Lucida Console', Monaco, monospace; font-weight: bold;">                    
            </p>                
        </div>          
    </div>
      
    <div class="row justify-content-center input-group mb-2"
        style="font-family: Georgia, serif;">

        <span class="col fs-4 fst-italic text-center"
            >
            <i class="bi bi-calendar-date"                                    
                > Fecha y Hora de visita:
            </i>
            <span id="fecha"></span>
        </span>
       
    </div>

</div>

<div class="container">    
    <div class="row justify-content-center m-1 g-2">
        <div class="col-auto text-center">
            <button class="btn btn-primary fs-5 fw-bold"
              onclick="obtiene_visitas_sitio_id_para_guardar(); return false;"
              >
                <i class="bi bi-save"                                    
                    > Guardar
                </i>                                                                
            </button>
        </div>           
        <div class="col-auto text-center">
            <button class="btn btn-secondary fs-5 fw-bold"
              >
                <i class="bi bi-printer"                                    
                    > Imprimir
                </i>                                                                
            </button>
        </div>           
        <div class="col-auto text-center">
            <button class="btn btn-info fs-5 fw-bold"
              onclick="ir_a_hoja_de_trabajo();"
              >
                <i class="bi bi-ui-checks"                                    
                    > Ir a Hoja de Trabajo
                </i>                                                                
            </button>
        </div>               
    </div>
</div>

<section id="datosInstitucion" class="container mt-2">        

    <div class="row justify-content-center mb-2">

        <div class="col-md-8 col-lg-6">

            <label for="contacto" class="form-label fs-5 fst-italic mt-2"
                >
                <i class="bi bi-person"
                    style="font-family: Georgia, serif;"                                    
                    > Persona de contacto:
                </i>
            </label>

            <div class="input-group">            
                <input type="text" id="contacto" 
                        class="form-control fs-5" 
                        aria-label="Contacto"
                        style="font-family: 'Gill Sans', sans-serif;">
            </div>

        </div>

    </div>

    <div class="row justify-content-center mb-2">

        <div class="col-md-8 col-lg-6">

            <label for="telefono" class="form-label fs-5 fst-italic"
                >
                <i class="bi bi-telephone"
                    style="font-family: Georgia, serif;"
                    > Teléfono:
                </i>
            </label>

            <div class="input-group">  
                <input type="text" id="telefono" 
                        class="form-control fs-5" 
                        aria-label="Teléfono"
                        style="font-family: 'Gill Sans', sans-serif;">
            </div>

        </div>
       
    </div>

    <div class="row justify-content-center mb-2">

        <div class="col-md-8 col-lg-6">

            <label for="direccion" class="form-label fs-5 fst-italic"
                >
                <i class="bi bi-geo-alt"
                    style="font-family: Georgia, serif;"
                    > Dirección:
                </i>
            </label>

            <div class="input-group">
                <input type="text" id="direccion" 
                        class="form-control fs-5" 
                        aria-label="Dirección"
                        style="font-family: 'Gill Sans', sans-serif;">
            </div>

        </div>

    </div>    

    <div class="row justify-content-center mb-2">

        <div class="col-md-8 col-lg-6">
        
            <label for="correo" class="form-label fs-5 fst-italic"
                >
                <i class="bi bi-envelope-at"
                    style="font-family: Georgia, serif;"
                    > Correo electrónico:
                </i>
            </label>

            <div class="input-group mb-2">
                <div class="input-group"
                    style="font-family: 'Gill Sans', sans-serif;">
                    <input type="text" id="correo" 
                            class="form-control fs-5" 
                            aria-label="Correo">
                    <span class="input-group-text">@mep.go.cr</span>        
                </div>
            </div>
          
        </div>

    </div>

</section>

<section id="datosInstitucionIncidencia" class="container mt-3">

    <div class="row justify-content-center">
        <div id="titulo_problema" class="col-md-8 col-lg-6 fs-4 text-center fst-italic"
             style="font-family: Georgia, serif;">
        </div>
    </div>

    <div class="row justify-content-center mt-2">
        <div id="descripcion_problema" class="col-md-8 col-lg-6 fs-5"
            style="font-family: 'Gill Sans', sans-serif;">
        </div>
    </div>

    <div class="row justify-content-center mt-2">
        <div class="col-md-8 col-lg-6 fs-4 fst-italic text-center"
            style="font-family: Georgia, serif;">
            Labor a Realizar en Equipos y Sistemas Afectados
        </div>
    </div>

    <div class="row justify-content-center mt-2">
        <div id="equipos_afectados" class="col-md-8 col-lg-6 fs-5"
            style="font-family: 'Gill Sans', sans-serif;">
        </div>    
    </div>
    
    <div class="row justify-content-center mt-2">
        <div id="labor_realizar" class="col-md-8 col-lg-6 fs-5"
            style="font-family: 'Gill Sans', sans-serif;">
        </div>    
    </div>

    <div class="row justify-content-center mt-2">
        <div class="col-md-8 col-lg-6 fs-4 fst-italic"
            style="font-family: Georgia, serif;">
            Observaciones:
        </div>
    </div>

    <div class="row justify-content-center mt-2 mb-2">
        <div id="observaciones" class="col-md-8 col-lg-6 fs-4 text-decoration-underline"
            style="font-family: Georgia, serif;">
        </div>    
    </div>   

</section>
        
<!-- Modal Aviso al Guardar-->
<div class="modal fade" id="modalGuardar" tabindex="-1" aria-labelledby="exampleModalLabel">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h1 class="modal-title fs-5" id="exampleModalLabel">TecnoPresta</h1>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <span id="mensajeModal"></span>
                <div class="container-fluid">
                    <div class="row">
                        <div class="col">
                            <span id="mensajeModalDescripcion"></span>
                        </div> 
                    </div>
                </div>                        
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Aceptar</button>                
                </div>
        </div>
    </div>
</div>


<!-- Optional JavaScript -->
<!-- jQuery first, then Popper.js, then Bootstrap JS -->    
<script src="js/jquery-3.5.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<!-- js del formulario -->
<script src="https://cdn.jsdelivr.net/npm/signature_pad@5.0.10/dist/signature_pad.umd.min.js"></script>
<script src="js/formulario_hoja_visita_sitio.js?version=21"></script>
</body>
</html>
