<!doctype html>
<html lang="es">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="manifest" href="manifest.json">
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <title>Solicitud</title>
  </head>
  <body>

    <nav class="navbar navbar-expand-sm navbar-expand-md navbar-expand-lg bg-dark navbar-dark">        
      <span class="navbar-brand mb-0 h1">Solicitud</span>          
  </nav>
  <nav class="navbar navbar-expand-sm navbar-expand-md navbar-expand-lg bg-dark navbar-dark">         
      <span class="navbar-brand mb-0 h1">
          <img src="img/fondo.png" width="50" height="50" alt="" loading="lazy">
          <a class="navbar-brand" href="formulario_menu_prestamo.html">Ir a Menú Préstamo</a>
      </span>               
    </nav>

    <div class="container-sm container-md container-lg">
      <div class="row justify-content-center"> 
        <div id="mensaje" class="form-group row"></div>
      </div>
    </div>

    <div class="container-sm container-md container-lg">      
       <!-- Plantilla de cards se carga del js -->
       <div class="d-flex justify-content-center">
        <div class="row">
          <div class="col" id="colCards" >
            <div class="card"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Contenedor Principal -->
    <div class="container-sm container-md container-lg" style="padding-top: 1em;">                    


      <div class="form-group row">
        <label for="date1" class="col-sm-2 col-form-label">Retiro:</label>              
        <div class="col-sm-3">            
            <input class="form-control" id="fechaRetiro"/>                          
        </div>
      </div>

      <div class="form-group row">
        <label for="date" class="col-sm-2 col-form-label">Devolución:</label>              
        <div class="col-sm-3">            
            <input class="form-control" id="fechaDevolución"/>                   
        </div>
      </div>   

    <div class="form-group row">
      <label for="txtCantidad" class="col-sm-2 col-form-label">Uso</label>              
      <div class="col-sm-8">            
        <textarea class="form-control" rows="3" cols="38"
            placeholder="Describa el uso que se le dará al equipo solicitado"
            maxlength="255"></textarea>                
      </div>                      
    </div>

    <div class="form-group row">
      <label for="date" class="col-sm-2 col-form-label">Artículos:</label>              
      <div class="col-sm-3">            
        <button type="button" class="btn btn-dark" data-toggle="modal" 
                data-target="#buscarModal">Agregar</button>
        <button type="button" class="btn btn-danger">Quitar</button>          
      </div>      
    </div>  

  </div>  
   <!-- Titulo tabla -->
   <div class="container-sm container-md container-lg">
      
      <div class="row justify-content-center p-1 bg-dark text-white"> 
          <strong>Artículos solicitados...</strong>
      </div>

      <div class="form-group row p-1 bg-secondary text-white">
        <div class="col-1" id="check"></div>
        <div class="col-4" id="nombre">Nombre</div>
        <div class="col" id="nombre">Cantidad</div>        
      </div>

  </div>

  <div class="container-sm container-md container-lg" id="plantilla">

    <!-- Plantilla de cards se carga del js -->
    <div class="form-group row" id="item">
      <div class="col-1"> 
        <div class="form-check">
          <input class="form-check-input position-static" type="checkbox" aria-label="...">
        </div>  
      </div>
      <div class="col-4" id="nombre">Parlante</div>
      <div class="col" id="cantidad">2</div>
      <div class="col" id="imagen"><img src="img/inventario.png" class="card-img" style="width: 4rem;"></div>
    </div>         

    <div class="form-group row" id="item">
      <div class="col-1"> 
        <div class="form-check">
          <input class="form-check-input position-static" type="checkbox" aria-label="...">
        </div>  
      </div>
      <div class="col-4" id="nombre">Proyector Epson</div>
      <div class="col" id="cantidad">1</div>
      <div class="col" id="imagen"><img src="img/inventario.png" class="card-img" style="width: 4rem;"></div>
    </div>         

  </div>    

    <div class="d-flex justify-content-center">
      <div class="row">            
          <button id="btnGuardar" type="button" class="btn btn-dark">Guardar</button>             
      </div>
    </div>
                 
      <div class="d-flex justify-content-center">
        <div class="row">
            <div class="col" style="width: 15rem;">
              <img class="card-img-top" src="img/fondo.png">
            </div>  
        </div>
      </div>

      <!-- Modal -->
      <div class="modal fade" id="buscarModal" tabindex="-1" role="dialog" aria-labelledby="exampleModalLabelTipo" aria-hidden="true">
        <div class="modal-dialog modal-sm modal-lg modal-lg modal-dialog-scrollable">
          <div class="modal-content">
            <div class="modal-header">
              <h5 class="modal-title" id="exampleModalLabelTipo">Seleccione el artículo y digite la cantidad</h5>
              <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                <span aria-hidden="true">&times;</span>
              </button>  
            </div>
            <div class="modal-body">
              
               <!-- Input Buscar -->
              <div class="form-group row">
                <label for="txtCantidad" class="col-sm-2 col-form-label">Buscar:</label>          
                <div class="col-sm">                
                    <input id="txtBuscar" type="text"  class="form-control" placeholder="digite el nombre del artículo" aria-label="" aria-describedby="basic-addon1">                    
                </div>                        
              </div>

              <div class="form-group row">
                <label for="txtCantidad" class="col-sm-2 col-form-label">Cantidad:</label>              
                <div class="col-sm-4">            
                    <input type="text" class="form-control" id="txtCantidad">             
                </div>                      
              </div>

              <!-- Plantilla que se carga en js -->
                <div class="card">  
                        
                    <div class="row no-gutters">
                      <div class="col-2">
                        <img src="img/inventario.png" class="card-img">
                      </div>
                      <div class="col-md-8">
                        <div class="card-body">                    
                          <h4 class="card-title">Impresora <span class="badge badge-pill badge-primary">14</span></h4>
                          <button id="btnAgregar" type="button" class="btn btn-dark">Solicitar</button>
                        </div>
                      </div>
                    </div>

                    <div class="row no-gutters">
                      <div class="col-2">
                        <img src="img/inventario.png" class="card-img">
                      </div>
                      <div class="col-md-8">
                        <div class="card-body">                    
                          <h4 class="card-title">Proyector <span class="badge badge-pill badge-primary">14</span></h4>
                          <button id="btnAgregar" type="button" class="btn btn-dark">Solicitar</button>
                        </div>
                      </div>
                    </div>

                    <div class="row no-gutters">
                      <div class="col-2">
                        <img src="img/inventario.png" class="card-img">
                      </div>
                      <div class="col-md-8">
                        <div class="card-body">                    
                          <h4 class="card-title">Parlante <span class="badge badge-pill badge-primary">14</span></h4>
                          <button id="btnAgregar" type="button" class="btn btn-dark">Solicitar</button>
                        </div>
                      </div>
                    </div>
                    
                </div>       
                               
            </div>
  
            <div class="modal-footer">            
              <button type="button" class="btn btn-secondary" data-dismiss="modal">Salir</button>              
            </div>
  
          </div>
        </div>
    </div> 
    
    <!-- Optional JavaScript -->
    <!-- jQuery first, then Popper.js, then Bootstrap JS -->    
    <script src="js/jquery-3.5.1.min.js"></script>
    <script src="js/bootstrap.min.js"></script>
    <!-- Datepicker by Gijgo.com is a plug-in for the jQuery Javascript library. -->
    <script src="gijgo/gijgo.min.js" type="text/javascript"></script>
    <link href="gijgo/gijgo.min.css" rel="stylesheet" type="text/css" />
    <script src="gijgo/messages.es-es.js" type="text/javascript"></script>
    <!-- js del formulario -->     
    <script src="js/formulario_solicitud.js"></script>

  </body>
</html>
